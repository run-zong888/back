    .card, section { background: #fff; border: 1px solid #d8d6cc; border-radius: 8px; }
    .card { padding: 16px; min-height: 96px; }
    .card b { display: block; color: #66645d; font-size: 13px; }
    .card span { display: block; margin-top: 8px; font-size: 28px; font-weight: 900; }
    .bad { color: #b3261e; }
    .good { color: #176b45; }
    section { padding: 18px; margin-top: 16px; }
    .grid2 { display: grid; grid-template-columns: 1.2fr .8fr; gap: 16px; }
    .grid3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; }
    canvas { width: 100%; min-height: 320px; border: 1px solid #d8d6cc; border-radius: 8px; background: #fff; }
    table { border-collapse: collapse; width: 100%; font-size: 14px; }
    th, td { border-bottom: 1px solid #e4e2d8; padding: 9px 8px; text-align: left; }
    th { background: #f0f0eb; position: sticky; top: 0; }
    .table-wrap { max-height: 560px; overflow: auto; border: 1px solid #d8d6cc; border-radius: 8px; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 8px; font-weight: 800; }
    .pill.win { color: #176b45; background: #eef8f2; }
    .pill.loss { color: #b3261e; background: #fff1ef; }
    .timeline { display: grid; gap: 8px; }
    .trade-row { display: grid; grid-template-columns: 90px 90px 1fr 110px 110px; gap: 10px; align-items: center; padding: 10px; border: 1px solid #d8d6cc; border-radius: 8px; background: #fff; }
    .bar-bg { height: 12px; background: #eee; border-radius: 8px; overflow: hidden; }
    .bar { height: 100%; }
    input { width: 100%; min-height: 40px; border: 1px solid #d8d6cc; border-radius: 8px; padding: 8px 10px; font: inherit; }
    @media (max-width: 900px) { .cards, .grid2, .grid3, .trade-row { grid-template-columns: 1fr; } }

function money(v) { return Number(v).toFixed(2); }
function cls(v) { return Number(v) >= 0 ? 'good' : 'bad'; }

function setup(id) {
  const c = document.getElementById(id);
  const ctx = c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);
  ctx.font = '15px Microsoft YaHei, Arial';
  return [c, ctx];
}

function drawLine(id, rows) {
  const [c, ctx] = setup(id);
  if (!rows.length) return;
  const vals = rows.map(r => Number(r.cum_pnl));
  const min = Math.min(0, ...vals), max = Math.max(0, ...vals), range = Math.max(max-min, 1);
  const pad = 48, w = c.width - pad*2, h = c.height - pad*2;
  const x = i => pad + w * i / Math.max(1, vals.length-1);
  const y = v => c.height - pad - (v-min)/range*h;
  ctx.strokeStyle = '#999'; ctx.beginPath(); ctx.moveTo(pad,y(0)); ctx.lineTo(c.width-pad,y(0)); ctx.stroke();
  ctx.strokeStyle = vals[vals.length-1] >= 0 ? '#176b45' : '#b3261e'; ctx.lineWidth = 3; ctx.beginPath();
  vals.forEach((v,i)=>{ if(i===0) ctx.moveTo(x(i),y(v)); else ctx.lineTo(x(i),y(v)); });
  ctx.stroke();
  ctx.fillStyle = '#111'; ctx.fillText('累计盈亏：' + money(vals[vals.length-1]), pad, 24);
}

function drawBars(id, rows, key='pnl') {
  const [c, ctx] = setup(id);
  const vals = rows.map(r => Number(r[key]));
  const maxAbs = Math.max(1, ...vals.map(v => Math.abs(v)));
  const pad = 46, gap = 8, bw = Math.max(8, (c.width-pad*2-gap*(vals.length-1))/Math.max(1, vals.length));
  const zero = c.height/2;
  ctx.strokeStyle = '#999'; ctx.beginPath(); ctx.moveTo(pad,zero); ctx.lineTo(c.width-pad,zero); ctx.stroke();
  vals.forEach((v,i)=>{
    const hh = Math.abs(v)/maxAbs*(c.height/2-pad);
    const x = pad+i*(bw+gap), y = v>=0 ? zero-hh : zero;
    ctx.fillStyle = v>=0 ? '#176b45' : '#b3261e';
    ctx.fillRect(x,y,bw,hh);
    ctx.save(); ctx.translate(x+bw/2,c.height-8); ctx.rotate(-Math.PI/4); ctx.fillStyle='#555'; ctx.fillText(rows[i].year || rows[i].month,0,0); ctx.restore();
  });
}

function drawDist() {
  const [c, ctx] = setup('dist');
  const wins = DATA.summary.wins, losses = DATA.summary.losses;
  const total = Math.max(1, wins + losses);
  const bars = [{label:'盈利', value:wins, color:'#176b45'}, {label:'亏损', value:losses, color:'#b3261e'}];
  bars.forEach((b,i)=>{
    const w = b.value/total*(c.width-180);
    const y = 110+i*90;
    ctx.fillStyle=b.color; ctx.fillRect(110,y,w,42);
    ctx.fillStyle='#111'; ctx.fillText(`${b.label} ${b.value} 笔`, 30, y+28);
  });
}

function miniBars(el, rows) {
  const maxAbs = Math.max(1, ...rows.map(r=>Math.abs(Number(r.pnl))));
  el.innerHTML = rows.map(r => `
    <div class="trade-row">
      <b>${r.code}</b><span>${r.name}</span>
      <div><div>${r.trades} 笔，胜率 ${r.win_rate}%</div><div class="bar-bg"><div class="bar" style="width:${Math.abs(Number(r.pnl))/maxAbs*100}%;background:${Number(r.pnl)>=0?'#176b45':'#b3261e'}"></div></div></div>
      <span class="${cls(r.pnl)}">${money(r.pnl)}</span><span>${Number(r.avg_return_pct||0).toFixed(2)}%</span>
    </div>`).join('');
}

function timeline(el, rows) {
  const maxAbs = Math.max(1, ...rows.map(r=>Math.abs(Number(r.pnl_amount))));
  el.innerHTML = rows.map(r => `
    <div class="trade-row">
      <span>${r.entry_date}</span><span>${r.exit_date}</span>
      <div><b>${r.code} ${r.name}</b><div class="muted">${r.industry_l2}</div><div class="bar-bg"><div class="bar" style="width:${Math.abs(Number(r.pnl_amount))/maxAbs*100}%;background:${Number(r.pnl_amount)>=0?'#176b45':'#b3261e'}"></div></div></div>
      <span class="${cls(r.pnl_amount)}">${money(r.pnl_amount)}</span><span>${Number(r.return_pct).toFixed(2)}%</span>
    </div>`).join('');
}

function renderTable(rows) {
  document.getElementById('tradeTable').innerHTML = rows.map(r => `
    <tr>
      <td>${r.entry_date}</td><td>${r.exit_date}</td><td><b>${r.code}</b> ${r.name}</td><td>${r.industry_l2}</td>
      <td>${Number(r.entry_price).toFixed(2)}</td><td>${Number(r.exit_price).toFixed(2)}</td>
      <td class="${cls(r.pnl_amount)}">${money(r.pnl_amount)}</td><td class="${cls(r.return_pct)}">${Number(r.return_pct).toFixed(2)}%</td>
      <td>${r.hold_days} 天</td><td><span class="pill ${r.pnl_amount>0?'win':'loss'}">${r.pnl_amount>0?'赚':'亏'}</span></td>
    </tr>`).join('');
}

drawLine('equity', DATA.equity);
drawBars('yearly', DATA.yearly);
drawBars('monthly', DATA.monthly);
drawDist();
miniBars(document.getElementById('topWin'), DATA.topWin);
miniBars(document.getElementById('topLoss'), DATA.topLoss);
timeline(document.getElementById('worstTimeline'), DATA.worstTrades);
renderTable(DATA.trades);

document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase();
  const rows = DATA.trades.filter(r => !q || JSON.stringify(r).toLowerCase().includes(q));
  renderTable(rows);
});
</script>
